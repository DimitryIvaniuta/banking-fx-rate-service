spring:
  application:
    name: banking-fx-rate-service
  datasource:
    url: jdbc:postgresql://localhost:5432/fxdb
    username: fx
    password: fx
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  jersey:
    application-path: /
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  fx:
    cache-ttl: PT30S
    freshness-sla: PT5M
    supported-pairs:
      - EUR/USD
      - USD/PLN
      - GBP/USD
      - EUR/PLN
    provider:
      name: stub-provider
      base-url: https://provider.example.internal
      api-key: stub-key
    kafka:
      enabled: false
      topic: fx-rate-events
      consumer-group-id: banking-fx-rate-service
    scheduled-ingestion:
      enabled: true
      fixed-delay: PT60S
    admin:
      api-key-enabled: true
      api-key-header-name: X-Admin-Api-Key
      api-key: change-me-in-production
    lock:
      enabled: true
      advisory-lock-id: 845001
